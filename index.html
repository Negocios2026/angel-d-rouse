<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Angel D' Rouse Boutique — Moda y confección a medida</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background: #FBF6F2;
    color: #2C2C2A;
    line-height: 1.6;
  }
  .serif { font-family: 'Georgia', serif; font-style: italic; }
  a { color: inherit; text-decoration: none; }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    background: rgba(75,21,40,0.0);
    transition: background 0.3s;
  }
  nav.scrolled { background: rgba(75,21,40,0.92); backdrop-filter: blur(8px); }
  nav .logo { font-family: 'Georgia', serif; font-style: italic; color: #fff; font-size: 19px; }
  nav ul { display: none; list-style: none; gap: 24px; }
  nav ul li a { color: #F4EDE9; font-size: 13px; letter-spacing: 0.5px; }
  @media (min-width: 760px) {
    nav ul { display: flex; }
  }
  nav .nav-cta {
    background: #D4537E;
    color: #fff;
    padding: 8px 18px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
  }

  /* HERO */
  .hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    overflow: hidden;
    padding: 6rem 1.5rem 3rem;
  }
  .hero-bg { position: absolute; inset: 0; z-index: 0; }
  .hero-bg img {
    width: 100%; height: 100%; object-fit: cover;
    animation: kenburns 20s ease-in-out infinite alternate;
  }
  @keyframes kenburns {
    0% { transform: scale(1) translate(0,0); }
    100% { transform: scale(1.18) translate(-2%,-1%); }
  }
  .hero-bg::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(75,21,40,0.6) 0%, rgba(75,21,40,0.4) 35%, rgba(40,12,22,0.85) 100%);
  }
  .hero-content { position: relative; z-index: 1; max-width: 640px; }
  .hero-eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
    color: #F0997B; margin-bottom: 1.2rem;
  }
